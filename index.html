:root{color-scheme:light;
 --bg:#f7f8fa;--card:#fff;--ink:#15181d;--mut:#5b6470;--line:#e3e7ee;
 --blue:#2563c9;--red:#cf3b3b;--green:#2f9e57;--amber:#c9881f;--purple:#7a4ad1;--slate:#64748b;

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:940px;margin:0 auto;padding:18px 16px 60px}
h1{font-size:21px;margin:0 0 2px}
.sub{color:var(--mut);font-size:13px;margin:0 0 14px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 13px;box-shadow:var(--shadow)}
.stat b{font-size:20px;display:block;line-height:1.1}
.stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.03em}
.note{background:#eef3fb;border:1px solid #d4e0f4;border-radius:10px;padding:10px 13px;font-size:13px;color:#2a3a52;margin:0 0 16px}
.tabs{display:flex;gap:6px;border-bottom:2px solid var(--line);margin:0 0 16px;flex-wrap:wrap}
.tab{background:none;border:0;padding:8px 12px;font:inherit;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:var(--ink);border-bottom-color:var(--blue)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:0 0 12px;box-shadow:var(--shadow)}
.evt{border-left:4px solid var(--slate)}
.evt[data-play=pressure]{border-left-color:var(--red)}
.evt[data-play=support]{border-left-color:var(--green)}
.evt[data-play=demand-signal]{border-left-color:var(--blue)}
.evt[data-play=leadership]{border-left-color:var(--purple)}
.evt[data-play=probe]{border-left-color:var(--amber)}
.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
.who{font-weight:700}
.dist{color:var(--mut);font-weight:500}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.bdg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.02em}
.bdg.th{background:#e7f3ec;color:#1d7a44}
.bdg.app{background:#eef0f4;color:#475569}
.bdg.play{color:#fff}
.play-pressure{background:var(--red)}.play-support{background:var(--green)}.play-demand-signal{background:var(--blue)}.play-leadership{background:var(--purple)}.play-probe{background:var(--amber)}
.when{font-weight:600;margin:8px 0 2px}
.loc{color:var(--mut);font-size:13px}
.flag{display:inline-block;background:#fdf2e2;color:#9a6a12;border:1px solid #f0dcb6;font-size:11px;font-weight:700;padding:1px 7px;border-radius:6px;margin-left:6px}
.flag.changed{background:#fde8e8;color:#a32626;border-color:#f3c4c4}
.whip{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0;align-items:center}
.whip .lab{font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--mut);text-transform:uppercase;margin-right:2px}
.axis{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid transparent}
.axis .ax{opacity:.6;margin-right:4px}
.p-strong-support,.p-support{background:#e4f4ea;color:#1d7a44}
.p-lean-support{background:#eef6e9;color:#4d7a1d}
.p-neutral{background:#eef1f5;color:#516074}
.p-unknown{background:#f1f2f4;color:#7a828e}
.p-lean-oppose{background:#fbeede;color:#9a5a12}
.p-strong-oppose,.p-oppose{background:#fbe5e5;color:#a32626}
.btn{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;color:var(--ink)}
.btn:hover{background:#f0f3f8}
.btn.src{text-decoration:none;display:inline-block;margin-top:8px}
.cap{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.cap summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--mut)}
.cap .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.cap label{font-size:11px;font-weight:700;color:var(--mut);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.02em}
.cap input,.cap textarea{width:100%;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff}
.cap textarea{min-height:46px;resize:vertical}
.cap .full{grid-column:1/3}
.saved{font-size:11px;color:var(--green);font-weight:700;margin-left:8px}
.grp{margin:18px 0 8px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:8px}
.grp .dot{width:10px;height:10px;border-radius:50%}
.mcard{border-left:4px solid var(--slate)}
.mcard[data-play=pressure]{border-left-color:var(--red)}.mcard[data-play=support]{border-left-color:var(--green)}.mcard[data-play=demand-signal]{border-left-color:var(--blue)}.mcard[data-play=leadership]{border-left-color:var(--purple)}.mcard[data-play=probe]{border-left-color:var(--amber)}
.party{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.party.D{background:var(--blue)}.party.R{background:var(--red)}
.links a{font-size:12px;color:var(--blue);text-decoration:none;margin-right:12px}
.links a:hover{text-decoration:underline}
.about p{margin:0 0 11px}.about h3{margin:18px 0 6px;font-size:15px}
.about ul{margin:0 0 11px;padding-left:20px}.about li{margin:3px 0}
.muted{color:var(--mut);font-size:12px}
.wikictx{background:#f3eefc;border:1px solid #e0d4f5;border-radius:8px;padding:8px 10px;margin:8px 0 0;font-size:12.5px;color:#4a3470}
.hide{display:none}
.evcount{font-size:11px;font-weight:700;color:var(--blue);background:#eaf1fc;border-radius:20px;padding:1px 8px;margin-left:6px}
</style></head>

const PUBLIC = DATA.public===true;
const $=(s,r=document)=>r.querySelector(s); const ce=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const PLAY_DOT={pressure:'var(--red)',support:'var(--green)','demand-signal':'var(--blue)',leadership:'var(--purple)',probe:'var(--amber)'};
const PLAY_LABEL={pressure:'Pressure / bird-dog',support:'Ally',['demand-signal']:'Demand signal',leadership:'Leadership',probe:'Probe'};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(iso){if(!iso)return 'date TBD';const d=new Date(iso);return d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function axisPill(ax,val){val=val||'unknown';return `<span class="axis p-${esc(val)}"><span class="ax">${esc(ax)}</span>${esc(val)}</span>`;}
function whipRow(wl){if(!wl)return '';return `<div class="whip"><span class="lab">Whip List</span>${axisPill('DC',wl.dc)}${axisPill('PE',wl.pe)}${axisPill('AI',wl.ai)}</div>`;}
function distKey(m){return m.chamber==='Senate'?0:parseInt((m.district||'NY-99').split('-')[1],10);}

function confFlag(e){
 if(e.date_changed_from) return '<span class="flag changed">date changed &mdash; verify</span>';
 if(e.date_confidence==='inferred') return '<span class="flag">date inferred &mdash; confirm</span>';
 if(e.date_confidence==='medium') return '<span class="flag">verify date</span>';
 return '';
}

function captureBlock(e){
 const k='cap:'+e.uid; let s={}; try{s=JSON.parse(localStorage.getItem(k)||'{}')}catch(_){}
 return `<details class="cap"><summary>Log turnout &amp; outcome (the structure test)</summary>
 <div class="grid">
   <div><label>People turned out</label><input data-k="turnout" value="${esc(s.turnout||'')}" placeholder="#"></div>
   <div><label>Lead organizer(s)</label><input data-k="organizer" value="${esc(s.organizer||'')}" placeholder="who pulled them in"></div>
   <div class="full"><label>What the member said</label><textarea data-k="said">${esc(s.said||'')}</textarea></div>
   <div class="full"><label>Notes / follow-up</label><textarea data-k="notes">${esc(s.notes||'')}</textarea></div>
 </div>
 <div style="margin-top:8px"><button class="btn" data-save="${esc(e.uid)}">Save</button><span class="saved hide">saved</span></div>
 </details>`;
}

function renderEvents(){

 DATA.events.forEach(e=>{
  const m=e.member||{}; const card=ce('div','card evt'); if(!PUBLIC)card.dataset.play=m.play||'';
  card.innerHTML=`<div class="row">
    <div><span class="who">${esc(m.name||e.member_name||'Unmatched')}</span> <span class="dist">${esc(m.district||'')} ${m.party?'&middot; '+esc(m.party):''}</span></div>
    <div class="badges">

    </div></div>

   ${e.summary?`<div class="muted" style="margin-top:6px">${esc(e.summary)}</div>`:''}
   ${(!PUBLIC && e.wiki_context)?`<div class="wikictx"><b>Wiki context:</b> ${esc(e.wiki_context)}</div>`:''}
   ${whipRow(m.whip_list)}
   ${e.source_url?`<a class="btn src" href="${esc(e.source_url)}" target="_blank" rel="noopener">Source &amp; details &#8599;</a>`:''}
   ${PUBLIC?'':captureBlock(e)}`;
  root.appendChild(card);
 });
}

function memberCard(m,evByMember){
 const c=ce('div','card mcard'); if(!PUBLIC)c.dataset.play=m.play;
 const n=(evByMember[m.id]||[]).length; const wl=m.whip_list||{};
 c.innerHTML=`<div class="row">
   <div><span class="party ${esc(m.party)}"></span><span class="who">${esc(m.name)}</span> <span class="dist">${esc(m.district||m.chamber)} &middot; ${esc(m.role||'')}</span>${n?`<span class="evcount">${n} upcoming</span>`:''}</div>
 </div>
 ${whipRow(wl)}
 ${(!PUBLIC&&wl.note)?`<div class="muted" style="margin-top:6px">${esc(wl.note)}</div>`:''}
 <div class="links" style="margin-top:8px"><a href="${esc(m.official_site)}" target="_blank" rel="noopener">Official site &#8599;</a><a href="${esc(m.events_page||m.official_site)}" target="_blank" rel="noopener">Events page &#8599;</a>${PUBLIC?'':`<a href="${esc(m.newsletter_signup||m.official_site)}" target="_blank" rel="noopener">Newsletter &#8599;</a>`}</div>`;
 return c;
}

function renderRoster(){
 const root=$('#roster'); root.innerHTML='';
 const evByMember={}; DATA.events.forEach(e=>{if(e.member_id){(evByMember[e.member_id]=evByMember[e.member_id]||[]).push(e)}});
 if(PUBLIC){
  const ms=[...DATA.roster].sort((a,b)=>distKey(a)-distKey(b));
  ms.forEach(m=>root.appendChild(memberCard(m,evByMember)));
  return;
 }
 const order=['leadership','pressure','support','demand-signal','probe'];
 order.forEach(play=>{
  const members=DATA.roster.filter(m=>m.play===play); if(!members.length)return;
  const pt=(DATA._meta_play_types&&DATA._meta_play_types[play])||'';
  const g=ce('div','grp'); g.innerHTML=`<span class="dot" style="background:${PLAY_DOT[play]}"></span>${esc(PLAY_LABEL[play])} &mdash; <span style="font-weight:600;text-transform:none;letter-spacing:0">${esc(pt)}</span>`;
  root.appendChild(g);
  members.forEach(m=>root.appendChild(memberCard(m,evByMember)));
 });
}
