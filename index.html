 DATA.events.forEach(e=>{
  const m=e.member||{}; const card=ce('div','card evt'); if(!PUBLIC)card.dataset.play=m.play||'';
  card.innerHTML=`<div class="row">
    <div><span class="who">${esc(m.name||e.member_name||'Unmatched')}</span> <span class="dist">${esc(m.district||'')} ${m.party?'&middot; '+esc(m.party):''}</span></div>
    <div class="badges">
      <span class="bdg ${e.category==='town_hall'?'th':'app'}">${e.category==='town_hall'?'town hall':'public appearance'}</span>
      ${(!PUBLIC&&m.play)?`<span class="bdg play play-${esc(m.play)}">${esc(PLAY_LABEL[m.play]||m.play)}</span>`:''}
    </div></div>
   <div class="when">${esc(e.title)}</div>
   <div class="loc">${fmtDate(e.start)}${confFlag(e)} &nbsp;&middot;&nbsp; ${esc((e.location&&(e.location.venue||e.location.city))||'')} ${e.location&&e.location.address?'&middot; '+esc(e.location.address):''}${e.recurrence?' &middot; <b>recurring '+esc(e.recurrence)+'</b>':''}</div>
   ${e.summary?`<div class="muted" style="margin-top:6px">${esc(e.summary)}</div>`:''}
   ${whipRow(m.whip_list)}
   ${e.source_url?`<a class="btn src" href="${esc(e.source_url)}" target="_blank" rel="noopener">Source &amp; details &#8599;</a>`:''}
   ${PUBLIC?'':captureBlock(e)}`;
  root.appendChild(card);
 });
}

function memberCard(m,evByMember){
 const c=ce('div','card mcard'); if(!PUBLIC)c.dataset.play=m.play;
 const n=(evByMember[m.id]||[]).length; const wl=m.whip_list||{};
 c.innerHTML=`<div class="row">
   <div><span class="party ${esc(m.party)}"></span><span class="who">${esc(m.name)}</span> <span class="dist">${esc(m.district||m.chamber)} &middot; ${esc(m.role||'')}</span>${n?`<span class="evcount">${n} upcoming</span>`:''}</div>
 </div>
 ${whipRow(wl)}
 ${(!PUBLIC&&wl.note)?`<div class="muted" style="margin-top:6px">${esc(wl.note)}</div>`:''}
 <div class="links" style="margin-top:8px"><a href="${esc(m.official_site)}" target="_blank" rel="noopener">Official site &#8599;</a><a href="${esc(m.events_page||m.official_site)}" target="_blank" rel="noopener">Events page &#8599;</a>${PUBLIC?'':`<a href="${esc(m.newsletter_signup||m.official_site)}" target="_blank" rel="noopener">Newsletter &#8599;</a>`}</div>`;
 return c;
}

function renderRoster(){
 const root=$('#roster'); root.innerHTML='';
 const evByMember={}; DATA.events.forEach(e=>{if(e.member_id){(evByMember[e.member_id]=evByMember[e.member_id]||[]).push(e)}});
 if(PUBLIC){
  const ms=[...DATA.roster].sort((a,b)=>distKey(a)-distKey(b));
  ms.forEach(m=>root.appendChild(memberCard(m,evByMember)));
  return;
 }
 const order=['leadership','pressure','support','demand-signal','probe'];
 order.forEach(play=>{
  const members=DATA.roster.filter(m=>m.play===play); if(!members.length)return;
  const pt=(DATA._meta_play_types&&DATA._meta_play_types[play])||'';
  const g=ce('div','grp'); g.innerHTML=`<span class="dot" style="background:${PLAY_DOT[play]}"></span>${esc(PLAY_LABEL[play])} &mdash; <span style="font-weight:600;text-transform:none;letter-spacing:0">${esc(pt)}</span>`;
  root.appendChild(g);
  members.forEach(m=>root.appendChild(memberCard(m,evByMember)));
 });
}

function renderAbout(){
 if(PUBLIC){
  $('#about').innerHTML=`
  <h3>What this is</h3>
  <p>Upcoming public events for the 15 members of Congress representing New York City and its suburbs (both U.S. Senators and NY-03 through NY-16), so constituents can show up and engage them. Each member also shows their current stance on three issues we track: <b>DC</b> (data centers), <b>PE</b> (federal preemption of state AI laws), <b>AI</b> (AI accountability). Support = pro-accountability / pro-state-authority / pro-safety.</p>
  <h3>Where events come from</h3>
  <ul><li>Members' email newsletters</li><li>Each member's official .gov events &amp; press pages</li><li>Daily local-press &amp; community-group coverage</li></ul>
  <p class="muted">Dates are verified against the source and re-checked close to the event. NY's congressional map is in litigation for the Nov 2026 election; incumbents/districts here are current.</p>`;
  return;
 }
 $('#about').innerHTML=`
 <h3>What this tracks</h3>
 <p>The 15 incumbents covering NYC and its suburbs &mdash; both Senators and 13 House members (NY-03 through NY-16) &mdash; and the public events where constituents can engage them. Each member shows their current <b>Whip List</b> status: <b>DC</b> (data centers), <b>PE</b> (preemption), <b>AI</b>. Support = HF-aligned.</p>
 <h3>Where event data comes from</h3>
 <ul>
  <li><b>Members' email newsletters</b> (Congress-Events Gmail label) &mdash; where town halls are announced first, often on short notice.</li>
  <li><b>Each member's .gov events &amp; press pages</b> &mdash; swept and date-verified each run.</li>
  <li><b>Daily local-press &amp; civic-group search</b> (Exa) &mdash; Patch, SILive, Brooklyn Eagle, LI Press, Bronx Times, neighborhood associations.</li>
  <li><b>Mobilize API</b> &mdash; thin supplement. Town Hall Project (old aggregator) is defunct.</li>
 </ul>
 <h3>The "play" for each member</h3>
 <ul id="playlist"></ul>
 <p class="muted"><b>Date verification:</b> every event's date is checked against its source and re-checked within 14 days. NY's map is in Nov-2026 litigation; incumbents/districts here are current.</p>`;
 const pl=$('#playlist'); const pts=DATA._meta_play_types||{};
 Object.keys(pts).forEach(k=>{const li=ce('li');li.innerHTML=`<b>${esc(PLAY_LABEL[k]||k)}:</b> ${esc(pts[k])}`;pl.appendChild(li);});
}

function renderNote(){
 $('#note').innerHTML = PUBLIC
   ? 'Upcoming public events for NYC-area members of Congress, with each member\'s current stance on data centers (DC), federal preemption (PE), and AI accountability (AI). Support = pro-accountability.'
   : '<b>A structure test, not just an alert feed.</b> Showing up is mobilizing; the power comes from the loop. Log who turned out and who organized them. Each member shows their current <b>Whip List</b> status: <b>DC</b> (data centers), <b>PE</b> (preemption), <b>AI</b>. Support = HF-aligned.';
}

function renderStats(){
 const c=DATA.counts||{};
 $('#stats').innerHTML=`
  <div class="stat"><b>${c.upcoming_total||0}</b><span>upcoming events</span></div>
  <div class="stat"><b>${c.next_14_days||0}</b><span>next 14 days</span></div>
  <div class="stat"><b>${(DATA.roster||[]).length}</b><span>members tracked</span></div>`;
 const d=DATA.generated?new Date(DATA.generated):null;
 $('#sub').innerHTML=`Last updated ${d?d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'&mdash;'} &middot; ${PUBLIC?'shared by Humans First / Left Coalition':'refreshes when the monitor runs &middot; Humans First / Left Coalition'}`;
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');
 ['events','roster','about'].forEach(id=>$('#'+id).classList.toggle('hide',id!==b.dataset.t));
 try{localStorage.setItem('tab',b.dataset.t)}catch(_){}
});
document.addEventListener('click',ev=>{
 const b=ev.target.closest('[data-save]'); if(!b)return;
 const det=b.closest('details'); const obj={};
 det.querySelectorAll('[data-k]').forEach(i=>obj[i.dataset.k]=i.value);
 try{localStorage.setItem('cap:'+b.dataset.save,JSON.stringify(obj));const s=b.nextElementSibling;s.classList.remove('hide');setTimeout(()=>s.classList.add('hide'),1500)}catch(_){}
});
renderNote();renderStats();renderEvents();renderRoster();renderAbout();
try{const t=localStorage.getItem('tab');if(t)document.querySelector(`.tab[data-t="${t}"]`)?.click()}catch(_){}
</script></body></html>
